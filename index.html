<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova guia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="bg-layer" class="bg-low-res"></div>

    <div class="google-center">
      <form method="get" action="http://bussola.mb/search" target="_self">
        <div class="search-area">
            <svg class="search-icon" viewBox="0 0 24 24">
                <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 
                         6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 
                         4.99L20.49 19l-4.99-5zm-6 0C8.01 14 6 11.99 6 
                         9.5S8.01 5 10.5 5 15 7.01 15 9.5 
                         12.99 14 10.5 14z"/>
            </svg>
            <input type="search" name="q" placeholder="Pesquisar na Bússola..." required autofocus>
        </div>

        <!-- Parâmetros fixos -->
        <input type="hidden" name="btnG" value="Pesquisa Bússola">
        <input type="hidden" name="client" value="default_frontend">
        <input type="hidden" name="output" value="xml_no_dtd">
        <input type="hidden" name="proxystylesheet" value="default_frontend">
        <input type="hidden" name="sort" value="date:D:L:d1">
        <input type="hidden" name="oe" value="UTF-8">
        <input type="hidden" name="ie" value="UTF-8">
        <input type="hidden" name="ud" value="1">
        <input type="hidden" name="exclude_apps" value="1">
        <input type="hidden" name="site" value="default_collection">
      </form>
    </div>

    <div class="tabs">
        <button class="tab-button" onclick="openTab(event, 'trabalho')">Trabalho</button>
        <button class="tab-button active" onclick="openTab(event, 'casa')">Casa</button>
        <button class="tab-button" onclick="openTab(event, 'estudos')">Estudos</button>
        <button class="tab-button" onclick="openTab(event, 'tfm')">Treino</button>
    </div>

    <div id="trabalho" class="tab-content"></div>
    <div id="casa" class="tab-content active"></div>
    <div id="estudos" class="tab-content"></div>
    <div id="tfm" class="tab-content"></div>

    <script src="script.js" defer></script>
</body>
</html>
